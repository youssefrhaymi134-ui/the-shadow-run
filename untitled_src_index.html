const ctx = canvas.getContext('2d');
const W = 900, H = 540;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ==================== INPUT ====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

const touch = { left:false, right:false, jump:false };
function bindTouch(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  const on = () => touch[key] = true;
  const off = () => touch[key] = false;
  el.addEventListener('touchstart', on, {passive:true});
  el.addEventListener('touchend', off, {passive:true});
  el.addEventListener('touchcancel', off, {passive:true});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindTouch('bl','left'); bindTouch('br','right'); bindTouch('bj','jump');

function inputLeft(){ return keys['ArrowLeft'] || keys['KeyA'] || touch.left; }
function inputRight(){ return keys['ArrowRight'] || keys['KeyD'] || touch.right; }
function inputJump(){ return keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.jump; }
function inputAny(){ return keys['KeyR'] || keys['Enter'] || keys['Space'] || touch.jump; }

// ==================== AUDIO ====================
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

function playSound(freq, dur, type='square', vol=0.08){
  if(!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}

// ==================== PARTICLES ====================
const particles = [];
function spawnParticles(x, y, color, count, speed, life, size){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const spd = Math.random()*speed+speed*0.3;
    particles.push({ x, y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-1, life, maxLife:life, color, size: Math.random()*size+1 });
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    const a = p.life/p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - cam.x, p.y - cam.y, p.size*a, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ==================== CAMERA ====================
const cam = { x:0, y:0 };
function updateCamera(target, levelW, levelH){
  const tx = target.x + target.w/2 - W/2;
  const ty = target.y + target.h/2 - H/2 + 40;
  cam.x += (tx - cam.x) * 0.1;
  cam.y += (ty - cam.y) * 0.08;
  cam.x = Math.max(0, Math.min(levelW - W, cam.x));
  cam.y = Math.max(0, Math.min(levelH - H, cam.y));
}

// ==================== UTILITIES ====================
function overlap(a, b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function createPlayer(x, y){
  return { x, y, w:20, h:28, vx:0, vy:0, speed:3.5, jumpForce:-10.5, gravity:0.52, grounded:false, facing:1, lives:3, coins:0, score:0, invincible:0, jumpPressed:false, frame:0, frameTimer:0, coyoteTime:0, dead:false };
}

// ==================== GAME STATE ====================

let totalScore = 0;

let transitionAlpha = 0;
let transitionState = null; // 'out' or 'in'
let transitionTarget = null;

function loadLevel(idx){
  const L = LEVELS[idx];
  level = L;
  player = createPlayer(L.playerStart[0], L.playerStart[1]);
  // Keep lives and score from previous
  if(idx > 0){
    player.lives = window._savedLives || 3;
    player.coins = window._savedCoins || 0;
    player.score = window._savedScore || 0;
  }
  enemies = L.enemies.map(e => {
    const type = e[0];
    let w=e[3],h=e[4],props=e[5]||{};
    if(type==='slime') return createEnemy(type,e[1],e[2],w,h,{...props, vy:0, squish:0});
    if(type==='skeleton') return createEnemy(type,e[1],e[2],w,h,{...props, walkSpeed:1.2, animTimer:0});
    if(type==='flyer') return createEnemy(type,e[1],e[2],w,h,{...props, baseY:e[2], phase:Math.random()*Math.PI*2});
    if(type==='crab') return createEnemy(type,e[1],e[2],w,h,{...props, walkSpeed:1.8, animTimer:0});
    return createEnemy(type,e[1],e[2],w,h,props);
  });
  coins = L.coins.map(c => ({x:c[0],y:c[1],type:c[2],collected:false,anim:Math.random()*Math.PI*2}));
  movingPlats = L.movingPlatforms.map(mp => ({
    x:mp.x, y:mp.y, w:mp.w, h:mp.h,
    startX:mp.x, startY:mp.y,
    minX:mp.minX||mp.x, maxX:mp.maxX||mp.x,
    minY:mp.minY||mp.y, maxY:mp.maxY||mp.y,
    speed:mp.speed, axis:mp.axis, type:mp.type, dir:1
  }));
  collectedCoins = 0;
  levelTimer = 0;
  cam.x = 0; cam.y = 0;
  particles.length = 0;
}

function savePlayerState(){
  window._savedLives = player.lives;
  window._savedCoins = player.coins;
  window._savedScore = player.score;
}

// ==================== BACKGROUND DRAWING ====================
function drawBackground(bgType){
  const L = level;
  const parX = cam.x * 0.3;
  const parY = cam.y * 0.2;

  if(bgType === 0){ // Forest
    // Sky gradient
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a3a2a');
    grad.addColorStop(0.5,'#2d5a3f');
    grad.addColorStop(1,'#1e4a30');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Background trees
    ctx.fillStyle = '#0f2a1a';
    for(let i=0;i<12;i++){
      const tx = ((i*200 - parX*0.5) % (W+200)) - 100;
      const th = 120 + Math.sin(i*2.3)*40;
      // Trunk
      ctx.fillRect(tx+25, H-th+parY*0.3+60, 12, th-40);
      // Canopy
      ctx.beginPath();
      ctx.arc(tx+31, H-th+parY*0.3+40, 35+Math.sin(i*1.7)*10, 0, Math.PI*2);
      ctx.fill();
    }

    // Mid trees
    ctx.fillStyle = '#153320';
    for(let i=0;i<8;i++){
      const tx = ((i*280 - parX*0.7) % (W+280)) - 140;
      const th = 160 + Math.sin(i*3.1)*30;
      ctx.fillRect(tx+30, H-th+parY*0.5+50, 16, th-50);
      ctx.beginPath();
      ctx.arc(tx+38, H-th+parY*0.5+30, 45+Math.sin(i*2.1)*12, 0, Math.PI*2);
      ctx.fill();
    }

    // Ground fog
    ctx.fillStyle = 'rgba(30,80,50,0.3)';
    ctx.fillRect(0, H-80, W, 80);
  }
  else if(bgType === 1){ // Ruins
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#2a1a10');
    grad.addColorStop(0.5,'#3d2a18');
    grad.addColorStop(1,'#2a1c10');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Background pillars
    ctx.fillStyle = '#1a1008';
    for(let i=0;i<6;i++){
      const px = ((i*240 - parX*0.4) % (W+240)) - 120;
      const ph = 180 + Math.sin(i*1.9)*40;
      ctx.fillRect(px+20, H-ph+parY*0.3+30, 30, ph);
      ctx.fillRect(px+10, H-ph+parY*0.3+25, 50, 12);
      ctx.fillRect(px+15, H-ph+parY*0.3+70, 40, 8);
    }

    // Torch glow
    for(let i=0;i<4;i++){
      const gx = ((i*350+100 - parX*0.6) % (W+350));
      const gy = H - 140 + parY*0.4;
      const grd = ctx.createRadialGradient(gx,gy,0,gx,gy,60);
      grd.addColorStop(0,'rgba(255,160,40,0.15)');
      grd.addColorStop(1,'rgba(255,100,20,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(gx-60,gy-60,120,120);
    }
  }
  else if(bgType === 2){ // Frost
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a2a3a');
    grad.addColorStop(0.4,'#2a3a4a');
    grad.addColorStop(1,'#1a2838');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Snow mountains
    ctx.fillStyle = '#1e3040';
    for(let i=0;i<5;i++){
      const mx = ((i*300 - parX*0.3) % (W+300)) - 150;
      ctx.beginPath();
      ctx.moveTo(mx, H);
      ctx.lineTo(mx+80, H-200+parY*0.2);
      ctx.lineTo(mx+160, H);
      ctx.fill();
    }

    // Snow particles (background)
    ctx.fillStyle = 'rgba(200,220,240,0.3)';
    const t = Date.now()*0.001;
    for(let i=0;i<30;i++){
      const sx = ((i*67 + t*20*(0.5+i%3*0.3) - parX*0.5) % (W+40)) - 20;
      const sy = ((i*43 + t*30*(0.3+i%2*0.4)) % (H+20)) - 10;
      ctx.fillRect(sx, sy, 2+i%2, 2+i%2);
    }
  }
}

    0:{top:'#4a8c3f',mid:'#3a7232',bot:'#2d5a28',edge:'#5a9c4f'},
    1:{top:'#8a7a6a',mid:'#7a6a5a',bot:'#6a5a4a',edge:'#9a8a7a'},
    2:{top:'#a08050',mid:'#8a6a40',bot:'#7a5a30',edge:'#b09060'},
    3:{top:'#b0c8d8',mid:'#90a8b8',bot:'#7090a0',edge:'#c0d8e8'},
    5:{top:'#5a8a4f',mid:'#4a7a3f',bot:'#3a6a2f',edge:'#6a9a5f'}
  };
  const c = colors[type] || colors[0];

  // Main body
  ctx.fillStyle = c.mid;
  ctx.fillRect(x, y, w, h);

  // Top surface
  ctx.fillStyle = c.top;
  ctx.fillRect(x, y, w, Math.min(6, h));

  // Bottom edge
  ctx.fillStyle = c.bot;
  ctx.fillRect(x, y+h-3, w, 3);

  // Side edges
  ctx.fillStyle = c.edge;
  ctx.fillRect(x, y, 2, h);
  ctx.fillRect(x+w-2, y, 2, h);

  // Texture details
  if(type === 0 || type === 5){
    // Grass tufts
    ctx.fillStyle = c.edge;
    for(let i=4;i<w-4;i+=12){
      ctx.fillRect(x+i, y-2, 3, 3);
      ctx.fillRect(x+i+5, y-3, 2, 4);
    }
  }
  else if(type === 1){
    // Stone cracks
    ctx.strokeStyle = c.bot;
    ctx.lineWidth = 1;
    for(let i=20;i<w;i+=35){
      ctx.beginPath();
      ctx.moveTo(x+i, y+6);
      ctx.lineTo(x+i+8, y+h-6);
      ctx.stroke();
    }
    // Stone block lines
    ctx.fillStyle = c.bot;
    for(let i=0;i<w;i+=40){
      ctx.fillRect(x+i, y+6, 1, h-12);
    }
  }
  else if(type === 3){
    // Ice sparkles
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const t = Date.now()*0.003;
    for(let i=8;i<w;i+=20){
      const sparkle = Math.sin(t+i*0.5)*0.5+0.5;
      if(sparkle > 0.7){
        ctx.fillRect(x+i, y+3, 2, 2);
      }
    }
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(x+4, y+2, w*0.3, 3);
  }
}

function drawMovingPlatform(mp){
  const x = mp.x-cam.x, y = mp.y-cam.y;
  const colors = {1:{top:'#9a8a7a',mid:'#7a6a5a',bot:'#6a5a4a'},2:{top:'#b09060',mid:'#8a6a40',bot:'#7a5a30'},3:{top:'#c0d8e8',mid:'#90a8b8',bot:'#7090a0'}};
  const c = colors[mp.type] || colors[2];

  // Chain/rope
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,4]);
  if(mp.axis==='x'){
    ctx.beginPath();
    ctx.moveTo(x+mp.w/2, y-30);
    ctx.lineTo(x+mp.w/2, y);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(x-20, y+mp.h/2);
    ctx.lineTo(x, y+mp.h/2);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = c.mid;
  ctx.fillRect(x, y, mp.w, mp.h);
  ctx.fillStyle = c.top;
  ctx.fillRect(x, y, mp.w, 4);
  ctx.fillStyle = c.bot;
  ctx.fillRect(x, y+mp.h-2, mp.w, 2);
  // Glow indicator
  ctx.fillStyle = 'rgba(255,220,100,0.5)';
  ctx.fillRect(x+mp.w/2-6, y+2, 12, 3);
}

// ==================== COIN DRAWING ====================
function drawCoin(coin){
  if(coin.collected) return;
  const x = coin.x-cam.x, y = coin.y-cam.y;
  const t = Date.now()*0.004;
  coin.anim += 0.05;
  const bob = Math.sin(coin.anim)*3;
  const scaleX = Math.cos(t + coin.x*0.1); // Rotation effect

  ctx.save();
  ctx.translate(x+8, y+8+bob);
  ctx.scale(Math.abs(scaleX)*0.6+0.4, 1);

  if(coin.type === 0){ // Gold
    const grd = ctx.createRadialGradient(-2,-2,0,0,0,8);
    grd.addColorStop(0,'#ffe066');
    grd.addColorStop(0.6,'#ffcc00');
    grd.addColorStop(1,'#cc9900');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0,0,7,0,Math.PI*2);
    ctx.fill();
    // Dollar sign
    ctx.fillStyle = '#cc8800';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$',0,0);
  } else { // Silver
    const grd = ctx.createRadialGradient(-2,-2,0,0,0,8);
    grd.addColorStop(0,'#e8e8f0');
    grd.addColorStop(0.6,'#c0c0d0');
    grd.addColorStop(1,'#9090a0');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0,0,7,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#808090';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

  }

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(-2,-3,2,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ==================== ENEMY DRAWING ====================
function drawEnemy(e){
  if(!e.alive) return;
  const x = e.x-cam.x, y = e.y-cam.y;

  if(e.type === 'slime'){
    const squish = e.squish || 0;
    const sw = e.w + squish*4;
    const sh = e.h - squish*3;
    const sx = x - squish*2;
    const sy = y + (e.h - sh);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(sx+sw/2, sy+sh+2, sw/2.5, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // Body
    const grd = ctx.createRadialGradient(sx+sw/2-3, sy+sh/2-2, 0, sx+sw/2, sy+sh/2, sw/1.5);
    grd.addColorStop(0,'#5ae050');
    grd.addColorStop(0.7,'#30b028');
    grd.addColorStop(1,'#208018');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(sx+sw/2, sy+sh/2, sw/2, sh/2, 0, 0, Math.PI*2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(sx+sw*0.35, sy+sh*0.35, 4, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx+sw*0.65, sy+sh*0.35, 4, 5, 0, 0, Math.PI*2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#111';
    const pd = e.facing > 0 ? 1.5 : -1.5;
    ctx.beginPath();
    ctx.arc(sx+sw*0.35+pd, sy+sh*0.38, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx+sw*0.65+pd, sy+sh*0.38, 2, 0, Math.PI*2);
    ctx.fill();
  }
  else if(e.type === 'skeleton'){
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x+e.w/2, y+e.h+2, e.w/2, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#d8d0c0';
    // Ribcage
    ctx.fillRect(x+4, y+10, e.w-8, 12);
    // Spine
    ctx.fillRect(x+e.w/2-2, y+8, 4, 16);
    // Ribs
    ctx.fillStyle = '#bab2a2';
    for(let i=0;i<3;i++){
      ctx.fillRect(x+3, y+11+i*4, e.w-6, 1);
    }
    // Head
    ctx.fillStyle = '#e8e0d0';
    ctx.beginPath();
    ctx.arc(x+e.w/2, y+7, 8, 0, Math.PI*2);
    ctx.fill();
    // Eye sockets
    ctx.fillStyle = '#330000';
    ctx.beginPath();
    ctx.arc(x+e.w/2-3, y+6, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+3, y+6, 2.5, 0, Math.PI*2);
    ctx.fill();
    // Eye glow
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(x+e.w/2-3, y+6, 1, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+3, y+6, 1, 0, Math.PI*2);
    ctx.fill();
    // Jaw
    ctx.fillStyle = '#d0c8b8';
    ctx.fillRect(x+e.w/2-4, y+11, 8, 3);
    // Legs
    const legPhase = Math.sin(e.animTimer*0.1)*3;
    ctx.fillStyle = '#c8c0b0';
    ctx.fillRect(x+4, y+22, 4, 8+legPhase);
    ctx.fillRect(x+e.w-8, y+22, 4, 8-legPhase);
  }
  else if(e.type === 'flyer'){
    const wingFlap = Math.sin(Date.now()*0.012)*8;
    // Wings
    ctx.fillStyle = '#8840aa';
    ctx.beginPath();
    ctx.ellipse(x+e.w/2-12, y+e.h/2-4+wingFlap*0.3, 12, 6+Math.abs(wingFlap)*0.3, -0.3+wingFlap*0.05, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x+e.w/2+12, y+e.h/2-4+wingFlap*0.3, 12, 6+Math.abs(wingFlap)*0.3, 0.3-wingFlap*0.05, 0, Math.PI*2);
    ctx.fill();

    // Body
    const grd = ctx.createRadialGradient(x+e.w/2, y+e.h/2, 0, x+e.w/2, y+e.h/2, 12);
    grd.addColorStop(0,'#cc60ff');
    grd.addColorStop(0.7,'#8830bb');
    grd.addColorStop(1,'#5510aa');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(x+e.w/2, y+e.h/2, e.w/2.2, e.h/2.2, 0, 0, Math.PI*2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    ctx.arc(x+e.w/2-4, y+e.h/2-2, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+4, y+e.h/2-2, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x+e.w/2-4, y+e.h/2-3, 1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+4, y+e.h/2-3, 1.2, 0, Math.PI*2);
    ctx.fill();
  }
  else if(e.type === 'crab'){
    const clawAnim = Math.sin(Date.now()*0.008)*0.3;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x+e.w/2, y+e.h+2, e.w/2.2, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // Claws
    ctx.fillStyle = '#e05030';
    ctx.save();
    ctx.translate(x-4, y+4);
    ctx.rotate(-0.4+clawAnim);
    ctx.fillRect(0,0,10,5);
    ctx.fillRect(8,-3,5,5);
    ctx.restore();
    ctx.save();
    ctx.translate(x+e.w+4, y+4);
    ctx.rotate(0.4-clawAnim);
    ctx.fillRect(-10,0,10,5);
    ctx.fillRect(-13,-3,5,5);
    ctx.restore();

    // Body
    const grd = ctx.createRadialGradient(x+e.w/2, y+e.h/2-2, 0, x+e.w/2, y+e.h/2, e.w/1.5);
    grd.addColorStop(0,'#ff6040');
    grd.addColorStop(0.7,'#d04020');
    grd.addColorStop(1,'#a02810');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(x+e.w/2, y+e.h/2, e.w/2.2, e.h/2, 0, 0, Math.PI*2);
    ctx.fill();

    // Eyes on stalks
    ctx.fillStyle = '#c03020';
    ctx.fillRect(x+e.w/2-6, y-4, 3, 6);
    ctx.fillRect(x+e.w/2+3, y-4, 3, 6);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x+e.w/2-5, y-5, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+5, y-5, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x+e.w/2-5, y-5, 1.5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+e.w/2+5, y-5, 1.5, 0, Math.PI*2);
    ctx.fill();

    // Legs
    ctx.strokeStyle = '#c03020';
    ctx.lineWidth = 2;
    const legP = Date.now()*0.006;
    for(let i=0;i<3;i++){
      const lx = x+4+i*5;
      const ly = y+e.h-2;
      const la = Math.sin(legP+i)*3;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx-6, ly+6+la);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(lx+e.w-8-i*5, ly);
      ctx.lineTo(lx+e.w-8-i*5+6, ly+6-la);
      ctx.stroke();
    }
  }
}

// ==================== PLAYER DRAWING ====================
function drawPlayer(){
  if(player.dead) return;
  if(player.invincible > 0 && Math.floor(player.invincible/3)%2===0) return; // Flash

  const x = player.x - cam.x;
  const y = player.y - cam.y;
  const f = player.facing;

  ctx.save();
  ctx.translate(x + player.w/2, y + player.h/2);
  ctx.scale(f, 1);
  ctx.translate(-player.w/2, -player.h/2);

  // Cape
  const capeWave = Math.sin(Date.now()*0.005)*3;
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(6, 10);
  ctx.quadraticCurveTo(2+capeWave, 18, 4+capeWave*0.5, 26);
  ctx.lineTo(10, 22);
  ctx.closePath();
  ctx.fill();

  // Legs
  const legAnim = player.grounded ? Math.sin(player.frameTimer*0.3)*4 : 3;
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(3, 20, 5, 8+legAnim);
  ctx.fillRect(12, 20, 5, 8-legAnim);

  // Boots
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(2, 26+legAnim, 7, 3);
  ctx.fillRect(11, 26-legAnim, 7, 3);

  // Body
  ctx.fillStyle = '#2980b9';
  ctx.fillRect(4, 8, 12, 13);

  // Belt
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(4, 18, 12, 3);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(8, 18, 4, 3);

  // Head
  ctx.fillStyle = '#f0c8a0';
  ctx.beginPath();
  ctx.arc(10, 6, 7, 0, Math.PI*2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#5a3010';
  ctx.beginPath();
  ctx.arc(10, 3, 7, Math.PI, Math.PI*2);
  ctx.fill();
  ctx.fillRect(3, 2, 14, 4);

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(13, 5, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.arc(14, 5, 1.3, 0, Math.PI*2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = '#a0705a';
  ctx.fillRect(13, 8, 3, 1);

  ctx.restore();
}

// ==================== PHYSICS / COLLISION ====================
function resolvePlayerPlatform(p, plat){
  //plat = {x,y,w,h}
  const overlapX = Math.min(p.x+p.w, plat.x+plat.w) - Math.max(p.x, plat.x);
  const overlapY = Math.min(p.y+p.h, plat.y+plat.h) - Math.max(p.y, plat.y);

  if(overlapX <= 0 || overlapY <= 0) return;

  if(overlapX < overlapY){
    if(p.x + p.w/2 < plat.x + plat.w/2){
      p.x -= overlapX;
    } else {
      p.x += overlapX;
    }
    p.vx = 0;
  } else {
    if(p.y + p.h/2 < plat.y + plat.h/2){
      p.y -= overlapY;
      p.vy = 0;
      p.grounded = true;
      p.coyoteTime = 6;
    } else {
      p.y += overlapY;
      if(p.vy < 0) p.vy = 0;
    }
  }
}

// ==================== ENEMY AI ====================
function updateEnemy(e){
  if(!e.alive) return;

  if(e.type === 'slime'){
    // Patrol
    e.vx = e.facing * 0.8;
    e.x += e.vx;
    e.vy += 0.4;
    e.y += e.vy;

    // Check if walked too far from start
    if(Math.abs(e.x - e.startX) > (e.patrolRange||100)){
      e.facing *= -1;
    }

    // Check platform edges - reverse if about to fall
    let onPlatform = false;
    for(const p of level.platforms){
      const testX = e.x + (e.facing>0?e.w+2:-2);
      if(testX >= p[0] && testX <= p[0]+p[2] && e.y+e.h >= p[1] && e.y+e.h <= p[1]+8){
        onPlatform = true; break;
      }
    }
    for(const mp of movingPlats){
      const testX = e.x + (e.facing>0?e.w+2:-2);
      if(testX >= mp.x && testX <= mp.x+mp.w && e.y+e.h >= mp.y && e.y+e.h <= mp.y+8){
        onPlatform = true; break;
      }
    }
    if(!onPlatform && e.grounded){
      e.facing *= -1;
      e.x += e.facing*2;
    }

    // Platform collision
    e.grounded = false;
    for(const p of level.platforms){
      if(overlap(e, {x:p[0],y:p[1],w:p[2],h:p[3]})){
        resolvePlayerPlatform(e, {x:p[0],y:p[1],w:p[2],h:p[3]});
      }
    }
    for(const mp of movingPlats){
      if(overlap(e, mp)){
        resolvePlayerPlatform(e, mp);
      }
    }

    // Squish animation
    if(e.squish > 0) e.squish -= 0.15;
    if(e.grounded && e.squish <= 0 && Math.random()<0.02) e.squish = 0.5;
  }
  else if(e.type === 'skeleton'){
    e.vx = e.facing * (e.walkSpeed||1.2);
    e.x += e.vx;
    e.vy += 0.45;
    e.y += e.vy;
    e.animTimer++;

    if(Math.abs(e.x - e.startX) > (e.patrolRange||120)){
      e.facing *= -1;
    }

    // Platform edge check
    let onPlatform = false;
    for(const p of level.platforms){
      const testX = e.x + (e.facing>0?e.w+2:-2);
      if(testX >= p[0] && testX <= p[0]+p[2] && e.y+e.h >= p[1] && e.y+e.h <= p[1]+8){
        onPlatform = true; break;
      }
    }
    if(!onPlatform && e.grounded){
      e.facing *= -1;
      e.x += e.facing*2;
    }

    e.grounded = false;
    for(const p of level.platforms){
      if(overlap(e, {x:p[0],y:p[1],w:p[2],h:p[3]})){
        resolvePlayerPlatform(e, {x:p[0],y:p[1],w:p[2],h:p[3]});
      }
    }
  }
  else if(e.type === 'flyer'){
    e.phase += e.freq || 0.02;
    e.x += e.facing * 0.7;
    e.y = e.baseY + Math.sin(e.phase) * (e.amplitude||50);

    if(Math.abs(e.x - e.startX) > (e.patrolRange||150)){
      e.facing *= -1;
    }
  }
  else if(e.type === 'crab'){
    e.vx = e.facing * (e.walkSpeed||1.8);
    e.x += e.vx;
    e.vy += 0.45;
    e.y += e.vy;
    e.animTimer++;

    if(Math.abs(e.x - e.startX) > (e.patrolRange||120)){
      e.facing *= -1;
    }

    let onPlatform = false;
    for(const p of level.platforms){
      const testX = e.x + (e.facing>0?e.w+2:-2);
      if(testX >= p[0] && testX <= p[0]+p[2] && e.y+e.h >= p[1] && e.y+e.h <= p[1]+8){
        onPlatform = true; break;
      }
    }
    if(!onPlatform && e.grounded){
      e.facing *= -1;
      e.x += e.facing*2;
    }

    e.grounded = false;
    for(const p of level.platforms){
      if(overlap(e, {x:p[0],y:p[1],w:p[2],h:p[3]})){
        resolvePlayerPlatform(e, {x:p[0],y:p[1],w:p[2],h:p[3]});
      }
    }
  }
}

// ==================== MOVING PLATFORMS ====================
function updateMovingPlatforms(){
  for(const mp of movingPlats){
    const prevX = mp.x, prevY = mp.y;
    if(mp.axis === 'x'){
      mp.x += mp.speed * mp.dir;
      if(mp.x <= mp.minX || mp.x >= mp.maxX) mp.dir *= -1;
    } else {
      mp.y += mp.speed * mp.dir;
      if(mp.y <= mp.minY || mp.y >= mp.maxY) mp.dir *= -1;
    }
    mp.dx = mp.x - prevX;
    mp.dy = mp.y - prevY;
  }
}

// ==================== PLAYER UPDATE ====================
function updatePlayer(){
  if(player.dead) return;

  // Horizontal movement
  let moveX = 0;
  if(inputLeft()) moveX = -1;
  if(inputRight()) moveX = 1;

  player.vx = moveX * player.speed;
  if(moveX !== 0) player.facing = moveX;

  // Jump
  const jumpBtn = inputJump();
  if(jumpBtn && !player.jumpPressed && (player.grounded || player.coyoteTime > 0)){
    player.vy = player.jumpForce;
    player.grounded = false;
    player.coyoteTime = 0;
    sfxJump();
    spawnParticles(player.x+player.w/2, player.y+player.h, '#aaa', 5, 2, 15, 2);
  }
  player.jumpPressed = jumpBtn;

  // Variable jump height
  if(!jumpBtn && player.vy < -3){
    player.vy *= 0.85;
  }

  // Gravity
  player.vy += player.gravity;
  if(player.vy > 12) player.vy = 12;

  // Move X
  player.x += player.vx;
  player.grounded = false;

  // Collide X with static platforms
  for(const p of level.platforms){
    if(overlap(player, {x:p[0],y:p[1],w:p[2],h:p[3]})){
      resolvePlayerPlatform(player, {x:p[0],y:p[1],w:p[2],h:p[3]});
    }
  }
  // Collide X with moving platforms
  for(const mp of movingPlats){
    if(overlap(player, mp)){
      resolvePlayerPlatform(player, mp);
    }
  }

  // Move Y
  player.y += player.vy;

  // Collide Y with static platforms
  for(const p of level.platforms){
    if(overlap(player, {x:p[0],y:p[1],w:p[2],h:p[3]})){
      resolvePlayerPlatform(player, {x:p[0],y:p[1],w:p[2],h:p[3]});
    }
  }
  // Collide Y with moving platforms
  let onMovingPlat = false;
  for(const mp of movingPlats){
    if(overlap(player, mp)){
      resolvePlayerPlatform(player, mp);
      if(player.grounded) onMovingPlat = true;
    }
  }

  // Move with moving platform
  if(onMovingPlat){
    for(const mp of movingPlats){
      // Check if standing on this platform
      if(player.y+player.h >= mp.y-2 && player.y+player.h <= mp.y+4 &&
         player.x+player.w > mp.x && player.x < mp.x+mp.w){
        player.x += mp.dx || 0;
        player.y += mp.dy || 0;
      }
    }
  }

  // Coyote time
  if(!player.grounded && player.coyoteTime > 0) player.coyoteTime--;

  // Animation
  player.frameTimer++;
  if(Math.abs(player.vx) > 0.5) player.frame++;

  // Invincibility
  if(player.invincible > 0) player.invincible--;

  // Fall off screen
  if(player.y > level.height + 50){
    hurtPlayer();
    if(!player.dead){
      player.x = level.playerStart[0];
      player.y = level.playerStart[1];
      player.vx = 0;
      player.vy = 0;
    }
  }

  // Left boundary
  if(player.x < 0) player.x = 0;
  // Right boundary
  if(player.x + player.w > level.width) player.x = level.width - player.w;
}

function hurtPlayer(){
  if(player.invincible > 0 || player.dead) return;
  player.lives--;
  sfxHurt();
  screenShake = 10;
  spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff4444', 12, 4, 20, 3);
  if(player.lives <= 0){
    player.dead = true;
    gameState = 'gameOver';
  } else {
    player.invincible = 90;
  }
}

// ==================== COLLISION CHECKS ====================
function checkCoinCollisions(){
  for(const c of coins){
    if(c.collected) continue;
    if(overlap(player, {x:c.x,y:c.y,w:16,h:16})){
      c.collected = true;
      const value = c.type === 0 ? 10 : 25;
      player.coins += value;
      player.score += value;
      collectedCoins++;
      sfxCoin();
      const color = c.type === 0 ? '#ffd700' : '#c0c0d0';
      spawnParticles(c.x+8, c.y+8, color, 8, 3, 20, 2);
    }
  }
}

function checkGemCollision(){
  if(!level.gem) return;
  if(overlap(player, {x:level.gem[0]-4,y:level.gem[1]-4,w:24,h:24})){
    player.score += 100;
    sfxGem();
    spawnParticles(level.gem[0]+8, level.gem[1]+8, '#ff6090', 20, 5, 30, 3);
    level.gem = null;
  }
}

function checkEnemyCollisions(){
  for(const e of enemies){
    if(!e.alive) continue;
    if(!overlap(player, e)) continue;

    // Check if player is falling onto enemy
    const playerBottom = player.y + player.h;
    const enemyTop = e.y;
    const enemyMid = e.y + e.h * 0.4;

    if(player.vy > 0 && playerBottom < enemyMid + 8){
      // Stomp!
      e.alive = false;
      player.vy = -7; // Bounce
      player.score += 50;
      sfxStomp();

      const colors = {slime:'#50e040', skeleton:'#d8d0c0', flyer:'#aa50dd', crab:'#e05030'};
      spawnParticles(e.x+e.w/2, e.y+e.h/2, colors[e.type]||'#fff', 15, 4, 25, 3);
    } else {
      hurtPlayer();
    }
  }
}

function checkFlagCollision(){
  if(overlap(player, {x:level.flagX-5,y:level.flagY-50,w:30,h:55})){
    savePlayerState();
    sfxLevelUp();
    spawnParticles(level.flagX, level.flagY-25, '#ffd700', 30, 5, 40, 3);
    if(currentLevel < LEVELS.length-1){
      gameState = 'levelComplete';
    } else {
      gameState = 'win';
    }
  }
}

// ==================== SCREENS ====================
function drawMenu(){
  menuTimer++;
  const t = menuTimer * 0.02;

  // Background
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a1a0f');
  grad.addColorStop(0.5,'#142a1a');
  grad.addColorStop(1,'#0a150f');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Animated particles in background
  ctx.fillStyle = 'rgba(80,200,100,0.3)';
  for(let i=0;i<20;i++){
    const px = (Math.sin(t+i*1.3)*200+W/2+i*40)%W;
    const py = (Math.cos(t*0.7+i*0.9)*150+H/2+i*20)%H;
    ctx.beginPath();
    ctx.arc(px, py, 2+Math.sin(t+i)*1, 0, Math.PI*2);
    ctx.fill();
  }

  // Ground decoration
  ctx.fillStyle = '#1a3a20';
  ctx.fillRect(0, H-60, W, 60);
  ctx.fillStyle = '#2a5a30';
  ctx.fillRect(0, H-60, W, 6);
  for(let i=0;i<W;i+=15){
    ctx.fillStyle = `hsl(${130+Math.sin(i)*10}, 50%, ${30+Math.sin(i*0.1+t)*5}%)`;
    ctx.fillRect(i, H-64-Math.sin(i*0.2+t)*2, 3, 5+Math.sin(i*0.3)*2);
  }

  // Title
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = '64px Righteous, sans-serif';
  ctx.fillText('SHADOW RUN', W/2+3, 150+3);

  // Title main
  const titleGrad = ctx.createLinearGradient(W/2-200, 120, W/2+200, 180);
  titleGrad.addColorStop(0,'#50e040');
  titleGrad.addColorStop(0.5,'#80ff70');
  titleGrad.addColorStop(1,'#40c030');
  ctx.fillStyle = titleGrad;
  ctx.font = '64px Righteous, sans-serif';
  ctx.fillText('SHADOW RUN', W/2, 150);

  // Subtitle
  ctx.font = '18px "Space Grotesk", sans-serif';
  ctx.fillStyle = '#8ab';
  ctx.fillText('A Platformer Adventure', W/2, 200);

  // Controls
  ctx.font = '14px "Space Grotesk", sans-serif';
  ctx.fillStyle = '#6a8a6a';
  ctx.fillText('Arrow Keys / WASD to Move  |  Space / Up to Jump  |  Stomp Enemies from Above', W/2, 280);

  // Enemy showcase
  ctx.font = '13px "Space Grotesk", sans-serif';
  const ey = 330;
  ctx.fillStyle = '#50e040';
  ctx.fillText('● Slime - Patrols platforms', W/2-200, ey);
  ctx.fillStyle = '#d8d0c0';
  ctx.fillText('● Skeleton - Walks and pursues', W/2+200, ey);
  ctx.fillStyle = '#aa50dd';
  ctx.fillText('● Flyer - Hovers in patterns', W/2-200, ey+25);
  ctx.fillStyle = '#e05030';
  ctx.fillText('● Crab - Fast and dangerous', W/2+200, ey+25);

  // Start prompt
  const alpha = Math.sin(t*2)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = '600 22px "Space Grotesk", sans-serif';
  ctx.fillText('Press SPACE or ENTER to Start', W/2, 430);

  ctx.restore();
}

function drawLevelComplete(){
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#50e040';
  ctx.font = '48px Righteous, sans-serif';
  ctx.fillText('Level Complete!', W/2, 160);

  ctx.fillStyle = '#ffd700';
  ctx.font = '24px "Space Grotesk", sans-serif';
  ctx.fillText(`Coins: ${collectedCoins}`, W/2, 230);

  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${player.score}`, W/2, 270);

  const alpha = Math.sin(Date.now()*0.004)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = '600 20px "Space Grotesk", sans-serif';
  ctx.fillText('Press SPACE to continue', W/2, 360);

  ctx.restore();
}

function drawGameOver(){
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#e74c3c';
  ctx.font = '52px Righteous, sans-serif';
  ctx.fillText('Game Over', W/2, 180);

  ctx.fillStyle = '#aaa';
  ctx.font = '22px "Space Grotesk", sans-serif';
  ctx.fillText(`Final Score: ${player.score}`, W/2, 250);

  const alpha = Math.sin(Date.now()*0.004)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = '600 18px "Space Grotesk", sans-serif';
  ctx.fillText('Press SPACE to restart', W/2, 330);

  ctx.restore();
}

function drawWin(){
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Celebration particles
  const t = Date.now()*0.003;
  for(let i=0;i<30;i++){
    const px = W/2 + Math.sin(t+i*0.7)*200;
    const py = 100 + Math.cos(t*1.3+i*1.1)*80;
    ctx.fillStyle = `hsl(${i*30+t*50}, 80%, 60%)`;
    ctx.beginPath();
    ctx.arc(px, py, 3+Math.sin(t+i)*2, 0, Math.PI*2);
    ctx.fill();
  }

  const titleGrad = ctx.createLinearGradient(W/2-200, 130, W/2+200, 170);
  titleGrad.addColorStop(0,'#ffd700');
  titleGrad.addColorStop(0.5,'#ffee88');
  titleGrad.addColorStop(1,'#ffaa00');
  ctx.fillStyle = titleGrad;
  ctx.font = '52px Righteous, sans-serif';
  ctx.fillText('Victory!', W/2, 150);

  ctx.fillStyle = '#fff';
  ctx.font = '22px "Space Grotesk", sans-serif';
  ctx.fillText('You conquered all three worlds!', W/2, 220);

  ctx.fillStyle = '#ffd700';
  ctx.font = '28px "Space Grotesk", sans-serif';
  ctx.fillText(`Final Score: ${player.score}`, W/2, 280);

  const alpha = Math.sin(Date.now()*0.004)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = '600 18px "Space Grotesk", sans-serif';
  ctx.fillText('Press SPACE to play again', W/2, 370);

  ctx.restore();
}

// ==================== MAIN GAME LOOP ====================
let lastTime = 0;
function gameLoop(timestamp){
  const dt = Math.min(timestamp - lastTime, 33);
  lastTime = timestamp;

  // Handle transitions
  if(transitionState === 'out'){
    transitionAlpha += 0.05;
    if(transitionAlpha >= 1){
      transitionAlpha = 1;
      if(transitionTarget === 'playing'){
        loadLevel(currentLevel);
        gameState = 'playing';
      }
      transitionState = 'in';
    }
  } else if(transitionState === 'in'){
    transitionAlpha -= 0.05;
    if(transitionAlpha <= 0){
      transitionAlpha = 0;
      transitionState = null;
    }
  }

  // State-specific input handling
  if(gameState === 'menu'){
    if(inputAny() && !transitionState){
      ensureAudio();
      currentLevel = 0;
      totalScore = 0;
      transitionState = 'out';
      transitionTarget = 'playing';
    }
    drawMenu();
  }
  else if(gameState === 'playing'){
    levelTimer++;

    updateMovingPlatforms();
    updatePlayer();
    for(const e of enemies) updateEnemy(e);
    checkCoinCollisions();
    checkGemCollision();
    checkEnemyCollisions();
    checkFlagCollision();
    updateParticles();
    updateCamera(player, level.width, level.height);

    if(screenShake > 0) screenShake--;

    // DRAW
    ctx.save();
    if(screenShake > 0){
      ctx.translate(Math.random()*8-4, Math.random()*8-4);
    }

    drawBackground(level.bgType);

    // Platforms
    for(const p of level.platforms) drawPlatform(p);
    for(const mp of movingPlats) drawMovingPlatform(mp);

    // Coins
    for(const c of coins) drawCoin(c);

    // Gem
    drawGem();

    // Flag
    drawFlag();

    // Enemies
    for(const e of enemies) drawEnemy(e);

    // Player
    drawPlayer();

    // Particles
    drawParticles();

    // Foreground fog/atmosphere
    if(level.bgType === 0){
      ctx.fillStyle = 'rgba(20,60,30,0.15)';
      ctx.fillRect(0,H-30,W,30);
    } else if(level.bgType === 2){
      // Snow foreground
      ctx.fillStyle = 'rgba(200,220,240,0.15)';
      const st = Date.now()*0.001;
      for(let i=0;i<15;i++){
        const sx = ((i*80+st*40)%W);
        const sy = ((i*60+st*50+i*30)%H);
        ctx.fillRect(sx,sy,3,3);
      }
    }

    ctx.restore();

    drawHUD();
  }
  else if(gameState === 'levelComplete'){
    // Keep drawing the level behind
    ctx.save();
    drawBackground(level.bgType);
    for(const p of level.platforms) drawPlatform(p);
    for(const mp of movingPlats) drawMovingPlatform(mp);
    for(const c of coins) drawCoin(c);
    drawFlag();
    drawPlayer();
    ctx.restore();
    drawHUD();
    drawLevelComplete();

    if(inputAny() && !transitionState){
      currentLevel++;
      transitionState = 'out';
      transitionTarget = 'playing';
    }
  }
  else if(gameState === 'gameOver'){
    drawGameOver();
    if(inputAny() && !transitionState){
      currentLevel = 0;
      totalScore = 0;
      window._savedLives = 3;
      window._savedCoins = 0;
      window._savedScore = 0;
      transitionState = 'out';
      transitionTarget = 'playing';
    }
  }
  else if(gameState === 'win'){
    drawWin();
    if(inputAny() && !transitionState){
      currentLevel = 0;
      totalScore = 0;
      window._savedLives = 3;
      window._savedCoins = 0;
      window._savedScore = 0;
      gameState = 'menu';
    }
  }

  // Transition overlay
  if(transitionAlpha > 0){
    ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
    ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(gameLoop);
}

// ==================== START ====================
requestAnimationFrame(gameLoop);
</script>
